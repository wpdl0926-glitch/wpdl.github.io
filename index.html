<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YERIN.B</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', 'Helvetica', sans-serif;
            background-color: #ffffff;
            background-image: url('background_1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* -------------------------------------------
           로딩 화면: 4색 애니메이션 블랍 그라데이션
           ------------------------------------------- */
        #loading-screen {
            position: fixed;
            inset: 0;
            background-color: #ffffff;
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            transition: opacity 1.2s ease-in-out, visibility 1.2s ease-in-out;
            pointer-events: none;
            overflow: hidden;
        }

        /* 각 색상 블랍의 공통 스타일 */
        .blob {
            position: absolute;
            width: 70vw;
            height: 70vw;
            max-width: 800px;
            max-height: 800px;
            border-radius: 50%;
            filter: blur(100px); /* 몽환적인 흐림 효과 */
            opacity: 0.8;
            will-change: transform;
            /* 더 역동적인 느낌을 위해 alternate 대신 loop 애니메이션 적용 */
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: linear; /* 일정한 속도로 루프 */
        }

        /* 각 블랍별 색상, 초기 위치, 애니메이션 지정 */
        .blob-1 { /* 파란색 */
            background-color: rgba(150, 175, 215, 0.7); 
            top: -20%;
            left: -20%;
            animation-name: moveBlob1;
        }

        .blob-2 { /* 핑크색 */
            background-color: rgba(250, 225, 235, 0.8);
            bottom: -20%;
            right: -20%;
            animation-name: moveBlob2;
        }

        .blob-3 { /* 민트색 */
            background-color: rgba(180, 240, 210, 0.7);
            top: 10%;
            right: 10%;
            animation-name: moveBlob3;
        }

        .blob-4 { /* 연노랑색 */
            background-color: rgba(255, 250, 200, 0.7);
            bottom: 10%;
            left: 10%;
            animation-name: moveBlob4;
        }

        /* 그라데이션이 화면 전체를 크게 도는 역동적인 애니메이션 정의 */
        @keyframes moveBlob1 {
            0% { transform: translate(-30vw, -30vh) scale(1); }
            25% { transform: translate(15vw, 15vh) scale(1.3); }
            50% { transform: translate(30vw, -15vh) scale(1.1); }
            75% { transform: translate(-15vw, 30vh) scale(1.4); }
            100% { transform: translate(-30vw, -30vh) scale(1); }
        }

        @keyframes moveBlob2 {
            0% { transform: translate(30vw, 30vh) scale(1); }
            25% { transform: translate(-15vw, -15vh) scale(1.3); }
            50% { transform: translate(-30vw, 15vh) scale(1.1); }
            75% { transform: translate(15vw, -30vh) scale(1.4); }
            100% { transform: translate(30vw, 30vh) scale(1); }
        }

        @keyframes moveBlob3 {
            0% { transform: translate(15vw, -15vh) scale(1); }
            25% { transform: translate(-30vw, 15vh) scale(1.3); }
            50% { transform: translate(30vw, 30vh) scale(1.1); }
            75% { transform: translate(-15vw, -30vh) scale(1.4); }
            100% { transform: translate(15vw, -15vh) scale(1); }
        }

        @keyframes moveBlob4 {
            0% { transform: translate(-15vw, 15vh) scale(1); }
            25% { transform: translate(30vw, -15vh) scale(1.3); }
            50% { transform: translate(-30vw, -30vh) scale(1.1); }
            75% { transform: translate(15vw, 30vh) scale(1.4); }
            100% { transform: translate(-15vw, 15vh) scale(1); }
        }

        /* ------------------------------------------- */

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0;
            box-sizing: border-box;
            position: relative;
        }

        .icon-scatter-container {
            position: relative;
            width: 100vw;
            max-width: none;
            height: 100vh;
        }

        .icon-wrapper {
            position: absolute;
            z-index: 20;
            cursor: pointer;
            will-change: transform, left, top;
        }

        .icon-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .icon-front,
        .icon-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .icon-back {
            transform: rotateY(180deg);
        }

        #icon-overlay {
            display: none;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1500;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #detail-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1600;
            width: 80vw;
            height: 80vh;
            perspective: 1200px;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }

        #detail-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        #detail-container.is-flipped #detail-inner {
            transform: rotateY(180deg);
        }

        .detail-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .detail-back {
            transform: rotateY(180deg);
        }

        .detail-face img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
        }

        .butterfly-wrapper {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            cursor: pointer;
            pointer-events: auto;
            will-change: transform;
        }

        .butterfly-wrapper:hover .butterfly-image {
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.9));
        }

        .butterfly-bob {
            animation: bobUpAndDown 2.8s ease-in-out infinite alternate;
            will-change: transform;
        }

        .butterfly-image {
            width: 60px;
            height: 60px;
            background-image: url('butterfly.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: flapWings 0.28s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate;
            transform-origin: 50% 48%;
            transition: filter 0.3s;
            will-change: transform, filter;
        }

        @keyframes bobUpAndDown {
            0% { transform: translate3d(0, -10px, 0) rotate(-2deg); }
            50% { transform: translate3d(3px, 2px, 0) rotate(1deg); }
            100% { transform: translate3d(-2px, 12px, 0) rotate(2deg); }
        }

        @keyframes flapWings {
            0% { transform: perspective(120px) rotateY(-12deg) rotateZ(-3deg) scaleX(0.92) scaleY(1.04); }
            45% { transform: perspective(120px) rotateY(8deg) rotateZ(2deg) scaleX(1.02) scaleY(0.98); }
            100% { transform: perspective(120px) rotateY(18deg) rotateZ(4deg) scaleX(0.86) scaleY(1.05); }
        }

        #camera-widget {
            display: none;
            position: fixed;
            z-index: 2000;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #camera-widget.mini {
            display: block;
            bottom: 30px;
            left: 30px;
            width: 280px;
            height: 180px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            background: #000;
            cursor: pointer;
        }

        #camera-widget.mini:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.8);
        }

        #camera-widget.mini .fullscreen-only {
            display: none !important;
        }

        .mac-green-dot {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background-color: #4cd137;
            border-radius: 50%;
            box-shadow: 0 0 8px #4cd137;
            z-index: 10;
        }

        #camera-widget.fullscreen .mac-green-dot {
            display: none;
        }

        #camera-widget.fullscreen {
            display: block;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 0;
            border: none;
        }

        #camera-main-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            gap: 15px;
        }

        #camera-widget.fullscreen #camera-main-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: auto;
            height: auto;
            align-items: center;
            z-index: 2100;
        }

        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #camera-widget.fullscreen #video-container {
            width: min(800px, calc(100vw - 28px));
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        .canvas-container {
            position: absolute !important;
            top: 0;
            left: 0;
            z-index: 2 !important;
        }

        .sticker-palette {
            display: flex;
            flex-direction: row;
            gap: 15px;
            padding: 10px 15px;
            width: min(800px, calc(100vw - 28px));
            height: 100px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow-x: auto;
            overflow-y: hidden;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        .sticker-palette::-webkit-scrollbar {
            height: 8px;
        }

        .sticker-palette::-webkit-scrollbar-thumb {
            background-color: #cbd1d8;
            border-radius: 10px;
        }

        .sticker-palette img {
            width: 65px;
            height: 65px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .sticker-palette img:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: min(800px, calc(100vw - 28px));
            height: 80px;
            margin-top: 5px;
        }

        .btn-delete {
            background-color: transparent;
            border: none;
            cursor: pointer;
            position: absolute;
            left: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background-color: rgba(255, 71, 87, 0.1);
            transform: scale(1.1);
        }

        .btn-delete svg {
            width: 28px;
            height: 28px;
            fill: #747d8c;
            transition: fill 0.2s;
        }

        .btn-delete:hover svg {
            fill: #ff4757;
        }

        .btn-capture {
            background-color: #ff4757;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid #ffeaa7;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-capture:hover {
            background-color: #ff6b81;
            transform: scale(1.08);
        }

        .btn-capture:active {
            transform: scale(0.95);
        }

        .btn-capture svg {
            width: 34px;
            height: 34px;
            fill: white;
        }

        #btn-close-camera {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            z-index: 3010;
        }

        #temp-canvas {
            visibility: hidden;
            position: absolute;
            top: -9999px;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <div id="icon-overlay"></div>
    
    <div id="detail-container">
        <div id="detail-inner">
            <div class="detail-face detail-front">
                <img id="detail-image-front" src="" alt="Detail Image Front">
            </div>
            <div class="detail-face detail-back">
                <img id="detail-image-back" src="" alt="Detail Image Back">
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="bgm.m4a" type="audio/mp4">
    </audio>

    <main>
        <div class="icon-scatter-container" id="iconContainer"></div>
    </main>

    <div id="camera-widget">
        <button id="btn-close-camera" class="fullscreen-only" title="카메라 끄기">X</button>

        <div id="camera-main-area">
            <div id="video-container">
                <div class="mac-green-dot"></div>
                <video id="video" autoplay playsinline></video>
                <canvas id="overlay-canvas"></canvas>
            </div>

            <div class="sticker-palette fullscreen-only" id="sticker-palette-container"></div>

            <div class="controls fullscreen-only">
                <button class="btn-delete" id="delete-btn" title="선택된 스티커 삭제">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                    </svg>
                </button>
                <button class="btn-capture" id="capture-btn" title="사진 찍고 저장하기">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
                    </svg>
                </button>
            </div>
        </div>

        <canvas id="temp-canvas"></canvas>
    </div>

    <script>
        // 무조건 최소 3초(3000ms) 동안 로딩 애니메이션 유지 후 페이드아웃
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.visibility = 'hidden';
                }, 3000); // 3초 유지
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            let isPhotoBoothOpen = false;
            let isDetailOpen = false;

            const iconOverlay = document.getElementById('icon-overlay');
            const detailContainer = document.getElementById('detail-container');
            const detailImageFront = document.getElementById('detail-image-front');
            const detailImageBack = document.getElementById('detail-image-back');
            const bgMusic = document.getElementById('bgMusic');
            const stickerAssetVersion = '1779921709408';

            function stickerUrl(numStr) {
                return `sticker${numStr}.png?v=${stickerAssetVersion}`;
            }

            function playBgMusic() {
                if (bgMusic) {
                    bgMusic.play().catch(err => console.log('Music play blocked:', err));
                }
            }

            function stopBgMusic() {
                if (bgMusic) {
                    bgMusic.pause();
                    bgMusic.currentTime = 0; 
                }
            }

            function closeDetailView() {
                isDetailOpen = false;
                iconOverlay.style.opacity = '0';
                detailContainer.style.opacity = '0';
                detailContainer.classList.remove('is-flipped');
                
                stopBgMusic();
                
                setTimeout(() => {
                    if (!isDetailOpen) {
                        iconOverlay.style.display = 'none';
                        detailContainer.style.display = 'none';
                        detailImageFront.src = '';
                        detailImageBack.src = '';
                    }
                    updateIconCenters();
                }, 300);
            }
            
            iconOverlay.addEventListener('click', closeDetailView);
            
            detailContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                detailContainer.classList.toggle('is-flipped');
            });

            const stickerPalette = document.getElementById('sticker-palette-container');
            if (stickerPalette) {
                for (let i = 1; i <= 60; i++) {
                    const numStr = i.toString().padStart(2, '0');
                    const img = document.createElement('img');
                    img.src = stickerUrl(numStr);
                    img.id = `stk${i}`;
                    img.onclick = function() { window.addSticker(this.id); };
                    stickerPalette.appendChild(img);
                }
            }

            const customLayout = [
              { "left": "21.63", "top": "12.42", "size": 79 }, { "left": "28.19", "top": "12.98", "size": 79 },
              { "left": "53.08", "top": "52.01", "size": 79 }, { "left": "13.10", "top": "80.84", "size": 79 },
              { "left": "54.75", "top": "39.63", "size": 79 }, { "left": "63.25", "top": "38.66", "size": 79 },
              { "left": "68.69", "top": "31.20", "size": 79 }, { "left": "79.97", "top": "27.97", "size": 79 },
              { "left": "85.14", "top": "47.24", "size": 79 }, { "left": "69.96", "top": "56.30", "size": 79 },
              { "left": "24.94", "top": "21.47", "size": 79 }, { "left": "42.19", "top": "42.45", "size": 79 },
              { "left": "35.13", "top": "31.12", "size": 87 }, { "left": "48.09", "top": "43.75", "size": 79 },
              { "left": "49.24", "top": "69.29", "size": 79 }, { "left": "63.34", "top": "51.55", "size": 79 },
              { "left": "74.39", "top": "35.17", "size": 79 }, { "left": "79.55", "top": "40.18", "size": 79 },
              { "left": "76.36", "top": "60.46", "size": 79 }, { "left": "44.55", "top": "14.15", "size": 79 },
              { "left": "22.96", "top": "47.65", "size": 79 }, { "left": "26.57", "top": "56.42", "size": 79 },
              { "left": "29.93", "top": "65.01", "size": 79 }, { "left": "35.71", "top": "65.39", "size": 79 },
              { "left": "52.14", "top": "78.93", "size": 79 }, { "left": "58.68", "top": "45.74", "size": 79 },
              { "left": "74.61", "top": "47.83", "size": 79 }, { "left": "74.31", "top": "24.36", "size": 79 },
              { "left": "89.99", "top": "40.00", "size": 79 }, { "left": "63.79", "top": "26.09", "size": 79 },
              { "left": "19.33", "top": "56.62", "size": 89 }, { "left": "60.22", "top": "72.17", "size": 79 },
              { "left": "33.42", "top": "53.22", "size": 79 }, { "left": "39.04", "top": "78.46", "size": 79 },
              { "left": "26.64", "top": "80.50", "size": 103 }, { "left": "23.78", "top": "67.97", "size": 79 },
              { "left": "73.64", "top": "75.62", "size": 79 }, { "left": "79.73", "top": "53.48", "size": 79 },
              { "left": "89.99", "top": "55.43", "size": 79 }, { "left": "30.86", "top": "24.68", "size": 79 },
              { "left": "15.80", "top": "68.72", "size": 89 }, { "left": "22.16", "top": "92.87", "size": 79 },
              { "left": "32.85", "top": "75.33", "size": 79 }, { "left": "39.60", "top": "53.13", "size": 79 },
              { "left": "19.96", "top": "79.38", "size": 103 }, { "left": "55.00", "top": "69.03", "size": 79 },
              { "left": "69.22", "top": "45.13", "size": 79 }, { "left": "84.82", "top": "32.69", "size": 79 },
              { "left": "79.42", "top": "78.77", "size": 79 }, { "left": "84.07", "top": "59.30", "size": 79 },
              { "left": "10.86", "top": "59.50", "size": 89 }, { "left": "30.70", "top": "44.10", "size": 79 },
              { "left": "29.26", "top": "92.79", "size": 79 }, { "left": "34.38", "top": "86.50", "size": 79 },
              { "left": "41.73", "top": "66.85", "size": 79 }, { "left": "57.18", "top": "81.16", "size": 79 },
              { "left": "68.29", "top": "69.52", "size": 79 }, { "left": "68.79", "top": "85.84", "size": 79 },
              { "left": "75.04", "top": "88.27", "size": 79 }, { "left": "81.40", "top": "89.75", "size": 79 }
            ];

            const container = document.getElementById('iconContainer');
            let iconElementsData = [];

            if (container) {
                for (let i = 0; i < customLayout.length; i++) {
                    const numStr = (i + 1).toString().padStart(2, '0');
                    const oLeft = parseFloat(customLayout[i].left);
                    const oTop = parseFloat(customLayout[i].top);
                    
                    const oSize = customLayout[i].size * 1.2; 

                    const iconWrapper = document.createElement('div');
                    iconWrapper.classList.add('icon-wrapper');
                    iconWrapper.dataset.sticker = numStr;
                    iconWrapper.setAttribute('aria-label', `sticker${numStr}`);
                    iconWrapper.style.width = `${oSize}px`;
                    iconWrapper.style.height = `${oSize}px`;

                    iconWrapper.style.left = `${oLeft}%`;
                    iconWrapper.style.top = `${oTop}%`;
                    iconWrapper.style.transform = `translate3d(-50%, -50%, 0) scale(1)`;

                    const iconInner = document.createElement('div');
                    iconInner.classList.add('icon-inner');

                    const frontFace = document.createElement('div');
                    frontFace.classList.add('icon-front');
                    frontFace.style.backgroundImage = `url('${stickerUrl(numStr)}')`;

                    const backFace = document.createElement('div');
                    backFace.classList.add('icon-back');
                    backFace.style.backgroundImage = `url('${stickerUrl(numStr)}')`;

                    iconInner.appendChild(frontFace);
                    iconInner.appendChild(backFace);
                    iconWrapper.appendChild(iconInner);
                    container.appendChild(iconWrapper);

                    const dataObj = {
                        element: iconWrapper,
                        originLeft: oLeft,
                        originTop: oTop,
                        currentLeft: oLeft,
                        currentTop: oTop,
                        targetLeft: oLeft,
                        targetTop: oTop,
                        currentScale: 1,
                        targetScale: 1,
                        cx: 0,
                        cy: 0
                    };
                    iconElementsData.push(dataObj);

                    iconWrapper.addEventListener('click', (e) => {
                        e.stopPropagation();

                        if (!isDetailOpen) {
                            isDetailOpen = true;
                            
                            detailImageFront.src = `detail${numStr}.png?v=${stickerAssetVersion}`;
                            detailImageBack.src = `detail${numStr}.png?v=${stickerAssetVersion}`; 
                            
                            if (numStr === '01') {
                                playBgMusic();
                            }
                            
                            iconOverlay.style.display = 'block';
                            detailContainer.style.display = 'block';
                            
                            requestAnimationFrame(() => {
                                iconOverlay.style.opacity = '1';
                                detailContainer.style.opacity = '1';
                            });
                        }
                    });
                }

                let mouseX = -1000;
                let mouseY = -1000;
                window.addEventListener('mousemove', e => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                });
                window.addEventListener('mouseout', () => {
                    mouseX = -1000;
                    mouseY = -1000;
                });

                function updateIconCenters() {
                    iconElementsData.forEach(data => {
                        const rect = data.element.getBoundingClientRect();
                        if (rect.width > 0) {
                            data.cx = rect.left + rect.width / 2;
                            data.cy = rect.top + rect.height / 2;
                        }
                    });
                }
                setTimeout(updateIconCenters, 200);
                window.addEventListener('resize', updateIconCenters);

                function settleMotion(current, target, rate, epsilon) {
                    const next = current + (target - current) * rate;
                    return Math.abs(next - target) < epsilon ? target : next;
                }

                function animateIcons() {
                    iconElementsData.forEach(data => {
                        if (isPhotoBoothOpen || isDetailOpen) {
                            data.targetScale = 1;
                            data.targetLeft = data.originLeft;
                            data.targetTop = data.originTop;
                        } else {
                            data.targetLeft = data.originLeft;
                            data.targetTop = data.originTop;
                            const dx = mouseX - data.cx;
                            const dy = mouseY - data.cy;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            if (distance < 150) {
                                const ratio = 1 - (distance / 150);
                                data.targetScale = 1 + (Math.sin(ratio * Math.PI / 2) * 1);
                            } else {
                                data.targetScale = 1;
                            }
                        }
                        const scaleDiff = Math.abs(data.currentScale - data.targetScale);
                        const leftDiff = Math.abs(data.currentLeft - data.targetLeft);
                        const topDiff = Math.abs(data.currentTop - data.targetTop);

                        if (scaleDiff > 0.001 || leftDiff > 0.01 || topDiff > 0.01) {
                            data.currentScale = settleMotion(data.currentScale, data.targetScale, 0.12, 0.001);
                            data.currentLeft = settleMotion(data.currentLeft, data.targetLeft, 0.12, 0.01);
                            data.currentTop = settleMotion(data.currentTop, data.targetTop, 0.12, 0.01);

                            data.element.style.left = `${data.currentLeft.toFixed(3)}%`;
                            data.element.style.top = `${data.currentTop.toFixed(3)}%`;
                            data.element.style.transform = `translate3d(-50%, -50%, 0) scale(${data.currentScale.toFixed(4)})`;

                            const newZIndex = data.currentScale > 1.05 ? 30 : 20;
                            if (data.element.style.zIndex != newZIndex) {
                                data.element.style.zIndex = newZIndex;
                            }
                        }
                    });
                    requestAnimationFrame(animateIcons);
                }
                animateIcons();
            }

            let cameraStreamActive = false;
            let fabricCanvas = null;
            const video = document.getElementById('video');
            const cameraWidget = document.getElementById('camera-widget');
            const videoContainer = document.getElementById('video-container');
            const tempCanvas = document.getElementById('temp-canvas');

            function createSingleButterfly() {
                const wrapper = document.createElement('div');
                wrapper.classList.add('butterfly-wrapper');
                const bobber = document.createElement('div');
                bobber.classList.add('butterfly-bob');
                const image = document.createElement('div');
                image.classList.add('butterfly-image');
                bobber.appendChild(image);
                wrapper.appendChild(bobber);
                document.body.appendChild(wrapper);

                wrapper.addEventListener('click', async (e) => {
                    e.stopPropagation();

                    if (isDetailOpen) return;

                    if (!cameraStreamActive) {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({
                                video: {
                                    width: { ideal: 1280 },
                                    height: { ideal: 720 }
                                },
                                audio: false
                            });
                            video.srcObject = stream;
                            cameraStreamActive = true;
                        } catch (err) {
                            alert('카메라 접근 권한이 필요합니다.');
                            return;
                        }
                    }
                    cameraWidget.style.display = 'block';
                    setTimeout(() => cameraWidget.className = 'mini', 10);
                });

                let bX = window.innerWidth / 2;
                let bY = window.innerHeight / 2;
                let bRot = 45;
                let velocityX = 0.35;
                let velocityY = -0.2;
                let targetX = bX;
                let targetY = bY;
                let lastFlutterTurn = 0;

                function chooseButterflyTarget() {
                    const margin = 70;
                    targetX = Math.random() * (window.innerWidth - margin * 2) + margin;
                    targetY = Math.random() * (window.innerHeight - margin * 2) + margin;
                }

                function angleDifference(target, current) {
                    let diff = target - (current % 360);
                    if (diff > 180) diff -= 360;
                    if (diff < -180) diff += 360;
                    return diff;
                }

                function animateButterfly(time = 0) {
                    if (time - lastFlutterTurn > 2600 || Math.hypot(targetX - bX, targetY - bY) < 110) {
                        chooseButterflyTarget();
                        lastFlutterTurn = time;
                    }

                    const dx = targetX - bX;
                    const dy = targetY - bY;
                    const distance = Math.max(1, Math.hypot(dx, dy));
                    const drift = 0.014;
                    const lift = Math.sin(time / 520) * 0.035;

                    velocityX += (dx / distance) * drift + Math.cos(time / 900) * 0.01;
                    velocityY += (dy / distance) * drift + lift;

                    const speed = Math.hypot(velocityX, velocityY);
                    const maxSpeed = 1.55;
                    if (speed > maxSpeed) {
                        velocityX = (velocityX / speed) * maxSpeed;
                        velocityY = (velocityY / speed) * maxSpeed;
                    }

                    bX += velocityX;
                    bY += velocityY;

                    const margin = 42;
                    if (bX < margin || bX > window.innerWidth - margin) {
                        velocityX *= -0.75;
                        bX = Math.max(margin, Math.min(window.innerWidth - margin, bX));
                        chooseButterflyTarget();
                    }
                    if (bY < margin || bY > window.innerHeight - margin) {
                        velocityY *= -0.75;
                        bY = Math.max(margin, Math.min(window.innerHeight - margin, bY));
                        chooseButterflyTarget();
                    }

                    const targetRotation = Math.atan2(velocityY, velocityX) * (180 / Math.PI) + 90;
                    bRot += angleDifference(targetRotation, bRot) * 0.08;
                    const sway = Math.sin(time / 230) * 5;

                    wrapper.style.transform = `translate3d(${bX.toFixed(2)}px, ${bY.toFixed(2)}px, 0) rotate(${(bRot + sway).toFixed(2)}deg)`;
                    requestAnimationFrame(animateButterfly);
                }

                chooseButterflyTarget();
                requestAnimationFrame(animateButterfly);
            }
            createSingleButterfly();

            videoContainer.addEventListener('click', (e) => {
                if (cameraWidget.classList.contains('mini')) {
                    e.stopPropagation();
                    cameraWidget.className = 'fullscreen';
                    isPhotoBoothOpen = true;

                    setTimeout(() => {
                        const ratio = video.videoHeight && video.videoWidth ? video.videoHeight / video.videoWidth : 9 / 16;
                        const displayWidth = Math.min(800, window.innerWidth - 28);
                        const displayHeight = displayWidth * ratio;

                        videoContainer.style.height = displayHeight + 'px';

                        if (!fabricCanvas) {
                            fabricCanvas = new fabric.Canvas('overlay-canvas');
                        }
                        fabricCanvas.setWidth(displayWidth);
                        fabricCanvas.setHeight(displayHeight);
                    }, 400);
                }
            });

            document.getElementById('btn-close-camera').addEventListener('click', (e) => {
                e.stopPropagation();
                cameraWidget.style.display = 'none';
                cameraWidget.className = '';
                isPhotoBoothOpen = false;

                videoContainer.style.height = '100%';

                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                }
                cameraStreamActive = false;
                if (fabricCanvas) fabricCanvas.clear();
            });

            window.addSticker = function(imgId) {
                if (!fabricCanvas) return;
                const imgElement = document.getElementById(imgId);
                const imgInstance = new fabric.Image(imgElement, {
                    left: fabricCanvas.width / 2,
                    top: fabricCanvas.height / 2,
                    originX: 'center',
                    originY: 'center',
                    scaleX: 0.5,
                    scaleY: 0.5,
                    transparentCorners: false,
                    cornerColor: '#111',
                    cornerStrokeColor: '#fff',
                    borderColor: '#111',
                    cornerSize: 12,
                    padding: 10,
                    cornerStyle: 'circle'
                });
                fabricCanvas.add(imgInstance);
                fabricCanvas.setActiveObject(imgInstance);
            };

            document.getElementById('delete-btn').addEventListener('click', function() {
                if (!fabricCanvas) return;
                const activeObject = fabricCanvas.getActiveObject();
                if (activeObject) {
                    fabricCanvas.remove(activeObject);
                } else {
                    alert('삭제할 스티커를 먼저 클릭해서 선택해주세요.');
                }
            });

            window.addEventListener('keydown', function(e) {
                if (!fabricCanvas) return;
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    const activeObject = fabricCanvas.getActiveObject();
                    if (activeObject) fabricCanvas.remove(activeObject);
                }
            });

            document.getElementById('capture-btn').addEventListener('click', function() {
                if (!fabricCanvas) return;
                fabricCanvas.discardActiveObject();
                fabricCanvas.renderAll();

                const flash = document.createElement('div');
                flash.style.position = 'fixed';
                flash.style.inset = '0';
                flash.style.backgroundColor = 'white';
                flash.style.zIndex = '9999';
                flash.style.pointerEvents = 'none';
                document.body.appendChild(flash);
                setTimeout(() => {
                    flash.style.transition = 'opacity 0.4s ease-out';
                    flash.style.opacity = '0';
                    setTimeout(() => document.body.removeChild(flash), 400);
                }, 50);

                try {
                    const ctx = tempCanvas.getContext('2d');
                    tempCanvas.width = fabricCanvas.width;
                    tempCanvas.height = fabricCanvas.height;

                    ctx.save();
                    ctx.translate(tempCanvas.width, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
                    ctx.restore();

                    const fabricEl = fabricCanvas.lowerCanvasEl || fabricCanvas.getElement();
                    ctx.drawImage(fabricEl, 0, 0, tempCanvas.width, tempCanvas.height);

                    const finalImageURL = tempCanvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = 'YerinB_Photo.png';
                    link.href = finalImageURL;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (e) {
                    console.error('저장 에러:', e);
                    alert('사진을 저장할 수 없습니다. 브라우저 보안 정책 때문에 차단될 수 있으니 localhost 또는 GitHub Pages에서 열어주세요.');
                }
            });
        });
    </script>
</body>
</html>
