<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YERIN.B</title>
    <style>
        /* === 기본 스타일 & 배경 이미지 === */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', sans-serif;
            
            background-color: #ffffff; 
            background-image: url('background_1.png');
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* === 메인 영역 === */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            
            /* ⭐️ 배경보다 무조건 위에 오도록 강제 설정 */
            position: relative; 
            z-index: 10; 
        }

        /* === 넓게 사용하는 배치 컨테이너 === */
        .icon-scatter-container {
            position: relative;
            width: 95%; 
            max-width: 1400px; 
            height: 70vh; 
            z-index: 10;
        }

        /* === 개별 아이콘 === */
        .icon {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            
            /* ⭐️ 아이콘이 배경 뒤로 숨지 않도록 z-index를 높임 */
            z-index: 20; 
            cursor: pointer; 
            will-change: transform; 
            transform: translate(-50%, -50%) scale(1);
            
            /* (디버깅용) 만약 이미지가 안 뜬다면 아래 주석을 풀고 테두리가 보이는지 확인해보세요! */
            /* border: 1px solid red; */
        }

        /* === 🦋 나비 애니메이션 스타일 === */
        .butterfly-wrapper {
            position: fixed;
            left: 0; 
            top: 0; 
            z-index: 50; /* 나비는 제일 위로 */
            pointer-events: none;
            transition: transform 5s ease-in-out; 
        }

        .butterfly-bob {
            animation: bobUpAndDown 3s ease-in-out infinite alternate;
        }

        .butterfly-image {
            width: 60px;
            height: 60px;
            background-image: url('butterfly.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: flapWings 0.4s ease-in-out infinite alternate; 
        }

        @keyframes bobUpAndDown {
            0% { transform: translateY(-15px); }
            100% { transform: translateY(15px); }
        }

        @keyframes flapWings {
            0% { transform: scaleX(1); }
            100% { transform: scaleX(0.4); } 
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="bgm.m4a" type="audio/mp4">
    </audio>

    <main>
        <div class="icon-scatter-container" id="iconContainer"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // ========================================================
            // 0. 화면 첫 클릭 시 배경음악(BGM) 재생
            // ========================================================
            let isMusicPlaying = false;
            const bgMusic = document.getElementById('bgMusic');

            document.body.addEventListener('click', () => {
                if (!isMusicPlaying && bgMusic) {
                    bgMusic.play().then(() => {
                        isMusicPlaying = true;
                    }).catch(error => {
                        console.log("음악 재생 에러:", error);
                    });
                }
            }, { once: true }); 

            // ========================================================
            // 1. 직접 지정한 커스텀 아이콘 배치 및 개별 크기 적용
            // ========================================================
            const customLayout = [
              { "left": "22.28", "top": "6.22", "size": 81 }, { "left": "28.26", "top": "5.64", "size": 81 },
              { "left": "52.61", "top": "49.65", "size": 81 }, { "left": "13.36", "top": "77.50", "size": 81 },
              { "left": "53.95", "top": "38.16", "size": 81 }, { "left": "62.99", "top": "36.02", "size": 81 },
              { "left": "69.32", "top": "33.29", "size": 81 }, { "left": "80.06", "top": "25.11", "size": 81 },
              { "left": "84.77", "top": "44.78", "size": 81 }, { "left": "71.19", "top": "53.74", "size": 81 },
              { "left": "24.23", "top": "16.46", "size": 81 }, { "left": "42.63", "top": "40.61", "size": 81 },
              { "left": "33.35", "top": "30.77", "size": 65 }, { "left": "48.22", "top": "42.94", "size": 81 },
              { "left": "48.68", "top": "67.29", "size": 81 }, { "left": "63.08", "top": "49.18", "size": 81 },
              { "left": "74.93", "top": "34.76", "size": 81 }, { "left": "80.06", "top": "39.44", "size": 81 },
              { "left": "76.44", "top": "55.41", "size": 81 }, { "left": "43.90", "top": "11.00", "size": 81 },
              { "left": "21.85", "top": "45.20", "size": 81 }, { "left": "25.54", "top": "54.15", "size": 81 },
              { "left": "28.97", "top": "62.92", "size": 81 }, { "left": "34.87", "top": "63.31", "size": 81 },
              { "left": "51.65", "top": "77.14", "size": 81 }, { "left": "58.32", "top": "43.25", "size": 81 },
              { "left": "74.59", "top": "45.39", "size": 81 }, { "left": "74.28", "top": "23.58", "size": 81 },
              { "left": "88.51", "top": "39.55", "size": 81 }, { "left": "63.54", "top": "23.19", "size": 81 },
              { "left": "18.15", "top": "54.36", "size": 91 }, { "left": "59.89", "top": "70.23", "size": 81 },
              { "left": "33.39", "top": "52.32", "size": 81 }, { "left": "38.27", "top": "76.66", "size": 81 },
              { "left": "24.40", "top": "81.04", "size": 106 }, { "left": "22.69", "top": "65.95", "size": 81 },
              { "left": "74.16", "top": "74.91", "size": 81 }, { "left": "79.81", "top": "51.15", "size": 81 },
              { "left": "88.51", "top": "52.71", "size": 81 }, { "left": "28.85", "top": "16.87", "size": 81 },
              { "left": "16.11", "top": "65.13", "size": 91 }, { "left": "19.76", "top": "93.52", "size": 81 },
              { "left": "31.95", "top": "73.46", "size": 81 }, { "left": "38.70", "top": "52.23", "size": 81 },
              { "left": "18.79", "top": "77.59", "size": 106 }, { "left": "54.57", "top": "67.03", "size": 81 },
              { "left": "70.51", "top": "41.91", "size": 81 }, { "left": "84.65", "top": "32.95", "size": 81 },
              { "left": "79.07", "top": "76.97", "size": 81 }, { "left": "83.10", "top": "56.52", "size": 81 },
              { "left": "11.35", "top": "57.59", "size": 91 }, { "left": "29.54", "top": "44.74", "size": 81 },
              { "left": "28.29", "top": "91.29", "size": 81 }, { "left": "33.51", "top": "84.86", "size": 81 },
              { "left": "41.02", "top": "64.80", "size": 81 }, { "left": "56.79", "top": "79.41", "size": 81 },
              { "left": "68.13", "top": "67.53", "size": 81 }, { "left": "71.64", "top": "84.48", "size": 81 },
              { "left": "76.52", "top": "86.81", "size": 81 }, { "left": "80.38", "top": "88.18", "size": 81 }
            ];

            const container = document.getElementById('iconContainer');
            const totalIcons = customLayout.length; 
            let iconElementsData = []; 

            // ⭐️ 만약 컨테이너를 찾지 못했다면 실행을 멈추고 콘솔에 에러 띄우기
            if (!container) {
                console.error("iconContainer를 찾을 수 없습니다.");
                return;
            }

            for (let i = 0; i < totalIcons; i++) {
                const icon = document.createElement('div');
                icon.classList.add('icon');
                
                // 이미지 번호 연결 (18 ~ 77번)
                const imageNumber = i + 18; 
                icon.style.backgroundImage = `url('icon_${imageNumber}.png')`;

                icon.style.left = `${customLayout[i].left}%`;
                icon.style.top = `${customLayout[i].top}%`;
                icon.style.width = `${customLayout[i].size}px`;
                icon.style.height = `${customLayout[i].size}px`;
                
                container.appendChild(icon);

                iconElementsData.push({
                    element: icon,
                    currentScale: 1, 
                    targetScale: 1,  
                    cx: 0,           
                    cy: 0            
                });
            }

            // ========================================================
            // 2. 근접 반응형 마우스 모션 (Proximity Hover)
            // ========================================================
            let mouseX = -1000;
            let mouseY = -1000;
            const effectRadius = 150; 

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            window.addEventListener('mouseout', () => {
                mouseX = -1000;
                mouseY = -1000;
            });

            function updateIconCenters() {
                iconElementsData.forEach(data => {
                    const rect = data.element.getBoundingClientRect();
                    // 요소가 아직 렌더링 안 됐을 때를 대비한 안전 코드
                    if (rect.width > 0) {
                        data.cx = rect.left + rect.width / 2;
                        data.cy = rect.top + rect.height / 2;
                    }
                });
            }

            setTimeout(updateIconCenters, 200); // 렌더링 대기 시간을 조금 더 늘림
            window.addEventListener('resize', updateIconCenters);

            function animateIcons() {
                iconElementsData.forEach(data => {
                    const dx = mouseX - data.cx;
                    const dy = mouseY - data.cy;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < effectRadius) {
                        const ratio = 1 - (distance / effectRadius);
                        const easeRatio = Math.sin(ratio * Math.PI / 2); 
                        data.targetScale = 1 + (easeRatio * 1.0); 
                    } else {
                        data.targetScale = 1;
                    }

                    data.currentScale += (data.targetScale - data.currentScale) * 0.12;
                    data.element.style.transform = `translate(-50%, -50%) scale(${data.currentScale})`;
                    
                    if (data.currentScale > 1.05) {
                        data.element.style.zIndex = 30; // 겹칠 때 더 확실하게 위로
                    } else {
                        data.element.style.zIndex = 20;
                    }
                });

                requestAnimationFrame(animateIcons);
            }
            animateIcons();

            // ========================================================
            // 3. 🦋 끊기지 않는 무한 비행 나비
            // ========================================================
            function createSingleButterfly() {
                const wrapper = document.createElement('div');
                wrapper.classList.add('butterfly-wrapper');
                const bobber = document.createElement('div');
                bobber.classList.add('butterfly-bob');
                const image = document.createElement('div');
                image.classList.add('butterfly-image');

                bobber.appendChild(image);
                wrapper.appendChild(bobber);
                document.body.appendChild(wrapper);

                let bX = window.innerWidth / 2;
                let bY = window.innerHeight / 2;
                let bRot = 45; 

                wrapper.style.transition = 'none';
                wrapper.style.transform = `translate(${bX}px, ${bY}px) rotate(${bRot}deg)`;
                
                setTimeout(() => {
                    wrapper.style.transition = 'transform 5s ease-in-out';
                    moveButterfly();
                }, 100);

                function moveButterfly() {
                    const margin = 50; 
                    const nextX = Math.random() * (window.innerWidth - margin * 2) + margin;
                    const nextY = Math.random() * (window.innerHeight - margin * 2) + margin;

                    const deltaX = nextX - bX;
                    const deltaY = nextY - bY;
                    const angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
                    
                    let targetRotation = angle + 90;
                    let diff = targetRotation - (bRot % 360);
                    if (diff > 180) diff -= 360;
                    if (diff < -180) diff += 360;
                    bRot += diff;

                    wrapper.style.transform = `translate(${nextX}px, ${nextY}px) rotate(${bRot}deg)`;
                    bX = nextX;
                    bY = nextY;
                }
                setInterval(moveButterfly, 4500);
            }
            createSingleButterfly();
        });
    </script>

</body>
</html>
